<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="docling.rs — meat grinder logo">
  <title>docling.rs — the document meat grinder</title>
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fa3b8"/>
      <stop offset=".45" stop-color="#5d7285"/>
      <stop offset="1" stop-color="#3c4d5c"/>
    </linearGradient>
    <linearGradient id="steelH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7b90a6"/>
      <stop offset=".5" stop-color="#54687a"/>
      <stop offset="1" stop-color="#42525f"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6903c"/>
      <stop offset="1" stop-color="#b45f22"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8edf2"/>
    </linearGradient>
  </defs>

  <!-- ===================== feed pages (going in) ===================== -->
  <g transform="rotate(-14 236 74)">
    <rect x="196" y="30" width="82" height="104" rx="7" fill="url(#page)" stroke="#9fb0c0" stroke-width="3"/>
    <text x="237" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#c0392b" text-anchor="middle">PDF</text>
    <g stroke="#b9c6d2" stroke-width="4" stroke-linecap="round">
      <line x1="208" y1="84" x2="266" y2="84"/>
      <line x1="208" y1="97" x2="266" y2="97"/>
      <line x1="208" y1="110" x2="252" y2="110"/>
    </g>
  </g>
  <g transform="rotate(9 322 58)">
    <rect x="288" y="18" width="70" height="88" rx="7" fill="url(#page)" stroke="#9fb0c0" stroke-width="3"/>
    <text x="323" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="bold" fill="#2e6da4" text-anchor="middle">DOCX</text>
    <g stroke="#b9c6d2" stroke-width="4" stroke-linecap="round">
      <line x1="300" y1="66" x2="346" y2="66"/>
      <line x1="300" y1="79" x2="346" y2="79"/>
    </g>
  </g>

  <!-- ===================== grinder body ===================== -->
  <!-- hopper (funnel) -->
  <path d="M195 96 L375 96 L332 176 L238 176 Z" fill="url(#steel)" stroke="#2e3b47" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="285" cy="96" rx="90" ry="16" fill="#6d8296" stroke="#2e3b47" stroke-width="6"/>
  <ellipse cx="285" cy="96" rx="66" ry="9" fill="#33414e"/>

  <!-- neck -->
  <rect x="252" y="170" width="66" height="34" fill="url(#steelH)" stroke="#2e3b47" stroke-width="6"/>

  <!-- horizontal barrel -->
  <rect x="132" y="200" width="240" height="88" rx="42" fill="url(#steel)" stroke="#2e3b47" stroke-width="6"/>
  <!-- barrel shine -->
  <rect x="152" y="212" width="196" height="14" rx="7" fill="#a9bbca" opacity=".55"/>

  <!-- outlet plate with holes -->
  <g>
    <ellipse cx="134" cy="244" rx="24" ry="44" fill="#7d92a5" stroke="#2e3b47" stroke-width="6"/>
    <g fill="#33414e">
      <circle cx="130" cy="222" r="6"/>
      <circle cx="126" cy="244" r="6"/>
      <circle cx="130" cy="266" r="6"/>
      <circle cx="142" cy="232" r="6"/>
      <circle cx="142" cy="256" r="6"/>
    </g>
  </g>

  <!-- clamp screw base -->
  <path d="M300 288 L336 288 L344 330 L292 330 Z" fill="url(#steelH)" stroke="#2e3b47" stroke-width="6" stroke-linejoin="round"/>
  <rect x="270" y="330" width="96" height="16" rx="8" fill="#3c4d5c" stroke="#2e3b47" stroke-width="5"/>

  <!-- crank -->
  <circle cx="372" cy="244" r="17" fill="#42525f" stroke="#2e3b47" stroke-width="6"/>
  <path d="M372 244 L448 178" stroke="#2e3b47" stroke-width="15" stroke-linecap="round"/>
  <path d="M372 244 L448 178" stroke="url(#rust)" stroke-width="9" stroke-linecap="round"/>
  <rect x="440" y="128" width="17" height="58" rx="8.5" fill="url(#rust)" stroke="#8a4a1c" stroke-width="4" transform="rotate(9 448 157)"/>

  <!-- ===================== output: clean markdown ribbon ===================== -->
  <g transform="rotate(4 60 262)">
    <rect x="14" y="216" width="100" height="120" rx="8" fill="url(#page)" stroke="#9fb0c0" stroke-width="3"/>
    <text x="26" y="246" font-family="ui-monospace, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#e6903c"># md</text>
    <g stroke="#8ea1b2" stroke-width="4" stroke-linecap="round">
      <line x1="26" y1="264" x2="100" y2="264"/>
      <line x1="26" y1="280" x2="100" y2="280"/>
      <line x1="26" y1="296" x2="84" y2="296"/>
      <line x1="26" y1="312" x2="100" y2="312"/>
    </g>
  </g>

  <!-- ===================== Ferris the crab, at the wheel ===================== -->
  <g transform="translate(497 305)">
    <!-- legs -->
    <g stroke="#b45f22" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M-34 26 q-16 6 -24 20"/>
      <path d="M-16 34 q-8 10 -10 22"/>
      <path d="M34 26 q16 6 24 20"/>
      <path d="M16 34 q8 10 10 22"/>
    </g>
    <!-- claws -->
    <g fill="url(#rust)" stroke="#8a4a1c" stroke-width="4">
      <path d="M-52 -6 q-22 -6 -26 -26 q14 2 22 -6 q4 16 16 20 Z"/>
      <path d="M52 -6 q22 -6 26 -26 q-14 2 -22 -6 q-4 16 -16 20 Z"/>
    </g>
    <!-- body -->
    <ellipse cx="0" cy="8" rx="58" ry="42" fill="url(#rust)" stroke="#8a4a1c" stroke-width="5"/>
    <!-- spikes -->
    <g fill="url(#rust)" stroke="#8a4a1c" stroke-width="4" stroke-linejoin="round">
      <path d="M-38 -24 l8 -14 l8 12"/>
      <path d="M-12 -32 l8 -14 l8 13"/>
      <path d="M16 -30 l8 -13 l8 12"/>
    </g>
    <!-- eyes -->
    <circle cx="-15" cy="2" r="6.5" fill="#2b2b2b"/>
    <circle cx="15" cy="2" r="6.5" fill="#2b2b2b"/>
    <circle cx="-13" cy="0" r="2.2" fill="#fff"/>
    <circle cx="17" cy="0" r="2.2" fill="#fff"/>
    <!-- smile -->
    <path d="M-10 20 q10 8 20 0" stroke="#8a4a1c" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===================== wordmark ===================== -->
  <text x="320" y="386" font-family="ui-monospace, 'Courier New', monospace" font-size="40" font-weight="bold" text-anchor="middle">
    <tspan fill="#3c4d5c">docling</tspan><tspan fill="#e6903c">.rs</tspan>
  </text>
</svg>
