[package]
name = "docling-pdf"
description = "PDF/image backend for docling.rs: pdfium text extraction + ONNX layout/table/OCR pipeline."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
# pdfium-render / ort need a newer compiler than the std-only crates' MSRV.
rust-version = "1.82"

[dependencies]
docling-core = { path = "../docling-core", version = "0.33.0" }
pdfium-render = "0.8"
ort = { version = "2.0.0-rc.12", default-features = false, features = ["std", "download-binaries", "tls-rustls"] }
image = "0.25"
flate2 = "1"
tar = "0.4"
regex = "1.11"
lopdf = "0.34"
fast_image_resize = "5.1.4"

[lib]
name = "docling_pdf"
