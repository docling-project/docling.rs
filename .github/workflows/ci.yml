name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded PR runs, but never interrupt a master run (it may publish).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Pure-Rust unit tests + the output-regression suite. The PDF/image/METS
      # snapshot tests need pdfium + the ONNX models, so they are NOT run here —
      # this job downloads no ML models and stays fast.
      - name: Test
        run: cargo test --workspace

  publish:
    name: publish changed crates
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Publishes each workspace crate whose current version is not yet on
      # crates.io, in dependency order. A no-op when nothing was version-bumped.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/ci_publish.sh
